name: gh-actions-with-artifacts
on:
  push:
    branches: [ "main" ]
  pull_request:


permissions:
  contents: write

jobs:
  download-code:
    runs-on: ubuntu-latest

    steps:
      - name: download source code
        uses: actions/checkout@v4
      - name: upload code as artifact
        uses: actions/upload-artifact@v4
        with: 
          name: source-code
          path: .
  
  sonar-scan:
    runs-on: ubuntu-latest
    needs: download-code
    continue-on-error: true
    steps:
      - name: download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: source-code
          path: .

      - name: SonarCloud official action
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: .
          env:
            SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
            SONAR_ORAGANIZATION_KEY: ${{secrets.SONAR_ORGANIZATION_KEY}}
            SONAR PROJECT KEY: ${{secrets.SONAR PROJECT KEY}}

  download-and-install:
    runs-on: ubuntu-latest
    needs: download-code    

    steps:
      - name: download code as artifact
        uses: actions/download-artifact@v4
        with:
          name: source-code
          path: .

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'

      - name: install dependencies
        run: npm ci

      - name: upload node_modules as artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: .
  
  build-project:
    runs-on: ubuntu-latest
    needs: download-code

    steps:

      - name: download node_modules artifact
        uses: actions/download-artifact@v4
        with:
          name: source-code
          path: .          

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'

      - name: install dependencies
        run: npm ci    
      - name: build project
        run: npm run build

      - name: upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: upload-dist
          path: ./dist
i
  deploy:
    runs-on: ubuntu-latest
    needs: build-project

    steps:
      - name: download dist folder
        uses: actions/download-artifact@v4
        with:
          name: upload-dist
          path: ./dist

      - name: deploy to gh pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}    
          publish_dir: ./dist
          publish_branch: gh-pages
    
